<!DOCTYPE html>
<html lang="xh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umbuzo: Ngumni uSivu?</title>
<style>
  :root{
    --ink:#1d1b16;
    --paper:#fbf6ec;
    --sun:#f4a33a;
    --leaf:#3f7d57;
    --soft:#efe6d4;
    --shadow:rgba(29,27,22,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:
      radial-gradient(circle at 20% 10%, #fde6c4 0, transparent 45%),
      radial-gradient(circle at 85% 90%, #d7ecdd 0, transparent 45%),
      var(--paper);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    color:var(--ink);
  }
  .card{
    width:100%;
    max-width:440px;
    background:#fff;
    border-radius:22px;
    padding:34px 28px 30px;
    box-shadow:0 18px 50px var(--shadow);
    border:1px solid var(--soft);
  }
  .eyebrow{
    font-size:.72rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--leaf);
    font-weight:700;
    margin-bottom:10px;
  }
  h1{
    font-size:2rem;
    line-height:1.15;
    margin-bottom:24px;
    font-weight:800;
  }
  .options{display:flex;flex-direction:column;gap:12px}
  .opt{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    text-align:left;
    background:var(--paper);
    border:2px solid transparent;
    border-radius:14px;
    padding:15px 16px;
    font-size:1.05rem;
    font-weight:600;
    color:var(--ink);
    cursor:pointer;
    transition:transform .12s ease, border-color .12s ease, background .12s ease;
  }
  .opt:hover{transform:translateY(-2px);border-color:var(--sun)}
  .opt:focus-visible{outline:3px solid var(--leaf);outline-offset:2px}
  .num{
    flex:0 0 30px;
    height:30px;
    border-radius:50%;
    background:#fff;
    border:2px solid var(--soft);
    display:grid;
    place-items:center;
    font-size:.9rem;
    color:var(--leaf);
  }
  .result{
    text-align:center;
    padding:14px 0 2px;
    animation:pop .45s cubic-bezier(.2,.8,.25,1.4);
  }
  .badge{
    width:78px;height:78px;
    margin:0 auto 16px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--sun),#f57d3a);
    display:grid;place-items:center;
    font-size:2.4rem;
    box-shadow:0 10px 26px rgba(245,125,58,.35);
  }
  .result h2{font-size:1.9rem;color:var(--leaf);margin-bottom:6px}
  .result p{color:#7a7264;font-size:.95rem}
  .again{
    margin-top:22px;
    background:none;border:none;
    color:var(--leaf);
    font-weight:700;
    cursor:pointer;
    font-size:.9rem;
    text-decoration:underline;
  }
  @keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
  @media (prefers-reduced-motion:reduce){
    .opt,.result{transition:none;animation:none}
  }
</style>
</head>
<body>
  <main class="card">
    <div id="quiz">
      <p class="eyebrow">Umbuzo</p>
      <h1>Ngumni uSivu?</h1>
      <div class="options" id="options">
        <button class="opt"><span class="num">1</span> Khwalo</button>
        <button class="opt"><span class="num">2</span> Radebe</button>
        <button class="opt"><span class="num">3</span> Mqwathi</button>
        <button class="opt"><span class="num">4</span> Maduna</button>
        <button class="opt"><span class="num">5</span> Ndala</button>
      </div>
    </div>
  </main>

<script>
  const quiz = document.getElementById('quiz');
  const original = quiz.innerHTML;

  function showResult(){
    quiz.innerHTML = `
      <div class="result">
        <div class="badge">🎉</div>
        <h2>Uyichanile :)</h2>
        <p>Ngumni uSivu? — uphendule kakuhle!</p>
        <button class="again" id="again">Phinda futhi</button>
      </div>`;
    document.getElementById('again').addEventListener('click', reset);
  }

  function reset(){
    quiz.innerHTML = original;
    bind();
  }

  function bind(){
    document.querySelectorAll('.opt').forEach(b =>
      b.addEventListener('click', showResult)
    );
  }

  bind();
</script>
</body>
</html>
